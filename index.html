<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>UA Flyer Editor</title>
  <style>
    :root{
      --ua-bg:#071a25;
      --ua-panel:#0b2436;
      --ua-card:#0e2b3f;
      --ua-border:rgba(255,255,255,.10);
      --ua-text:#f8f7f2;
      --ua-muted:#dbe8f2;
      --ua-gold:#f4c95c;
      --ua-gold-2:#ffd873;
      --ua-teal:#0e5b63;
      --ua-cyan:#2bc0be;
      --ua-green:#4fd49b;
      --ua-shadow:0 16px 40px rgba(0,0,0,.35);
    }
    *{box-sizing:border-box}
    html,body{height:100%}
    body{
      margin:0;
      font-family: Arial, Helvetica, sans-serif;
      background:radial-gradient(circle at top left,#143450 0%,#08141f 58%,#06121b 100%);
      color:var(--ua-text);
    }
    .app-shell{
      display:grid;
      grid-template-columns:minmax(320px,1fr) 380px;
      min-height:100vh;
    }
    .left-pane{padding:28px 24px 32px 28px}
    .right-pane{
      background:rgba(6,18,27,.72);
      border-left:1px solid var(--ua-border);
      padding:22px;
      overflow:auto;
      backdrop-filter: blur(12px);
    }
    .topbar{
      display:flex; align-items:center; gap:14px; margin-bottom:18px;
    }
    .select, .btn, .field input, .field textarea, .field select{
      border-radius:16px;
      border:1px solid rgba(255,255,255,.12);
      background:#102a3b;
      color:var(--ua-text);
      font-size:15px;
    }
    .select{padding:14px 18px; min-width:230px; font-weight:700; box-shadow:var(--ua-shadow)}
    .btn{
      padding:14px 18px; cursor:pointer; font-weight:800; box-shadow:var(--ua-shadow);
      background:linear-gradient(135deg,#5be2b5,#48c99c); color:#073423;
    }
    .btn.secondary{background:#102a3b;color:var(--ua-text)}
    .btn.small{padding:10px 12px; font-size:14px}
    .topbar .spacer{flex:1}
    .canvas-wrap{
      display:flex; align-items:flex-start; justify-content:center;
      padding-top:8px;
    }

    /* flyer size */
    .flyer{
      position:relative;
      width:680px;
      aspect-ratio:1080 / 1920;
      overflow:hidden;
      border-radius:0;
      box-shadow:0 28px 60px rgba(0,0,0,.45);
      background:
        radial-gradient(circle at 85% 18%, rgba(74,184,137,.35) 0, rgba(74,184,137,.18) 16%, rgba(74,184,137,0) 28%),
        radial-gradient(circle at 14% 88%, rgba(74,184,137,.35) 0, rgba(74,184,137,.12) 18%, rgba(74,184,137,0) 28%),
        linear-gradient(135deg,#03283e 0%,#07344b 42%,#0b5b60 100%);
      color:var(--ua-gold-2);
    }
    .flyer::before{
      content:""; position:absolute; inset:0;
      background:linear-gradient(180deg, rgba(1,10,17,.08), rgba(1,10,17,.18));
      pointer-events:none;
    }
    .flyer::after{
      content:""; position:absolute; inset:0;
      background-image:radial-gradient(rgba(255,255,255,.05) 0.7px, transparent 0.7px);
      background-size: 28px 28px;
      opacity:.08;
      pointer-events:none;
      display:none;
    }
    .flyer.use-pattern::after{display:block}
    .bg-photo{position:absolute; inset:0; background-size:cover; background-position:center; opacity:0; transition:opacity .2s ease}
    .bg-photo.show{opacity:.22}
    .overlay{position:absolute; inset:0; background:linear-gradient(135deg,rgba(2,20,31,.84),rgba(7,52,75,.70) 45%,rgba(8,94,96,.52)); pointer-events:none}

    .content{position:relative; z-index:2; width:100%; height:100%; padding:58px 56px 46px}
    .logo{position:absolute; left:56px; top:50px; width:360px; z-index:4}
    .logo img{width:100%; height:auto; display:block}
    .partner{position:absolute; right:56px; top:58px; max-width:140px; max-height:80px; display:none; z-index:4; object-fit:contain; filter: drop-shadow(0 4px 10px rgba(0,0,0,.25));}
    .partner.show{display:block}
    .legal{position:absolute; left:56px; right:56px; bottom:46px; font-size:15px; line-height:1.22; color:#fff7d6; opacity:.95; z-index:3}

    /* common typesetting */
    .eyebrow{font-weight:800; letter-spacing:-.02em; color:var(--ua-gold-2)}
    .title-main{font-weight:900; letter-spacing:-.045em; line-height:.95; color:var(--ua-gold-2); margin:0}
    .body-copy{font-weight:800; line-height:1.08; color:var(--ua-gold-2)}
    .small-copy{font-weight:800; line-height:1.1; color:var(--ua-gold-2)}

    /* PROMO */
    .promo .discount-box{
      position:absolute; left:56px; top:372px; width:632px; height:346px;
      border:5px solid var(--ua-gold-2); border-radius:34px; padding:28px 30px;
      display:flex; flex-direction:column; justify-content:flex-start;
    }
    .promo .promo-top{font-size:74px; line-height:.95; font-weight:900; max-width:240px}
    .promo .discount-line{display:flex; align-items:flex-end; gap:10px; margin-top:10px; flex-wrap:nowrap}
    .promo .discount-num{font-size:210px; line-height:.82; font-weight:900; letter-spacing:-.06em}
    .promo .discount-side{display:flex; align-items:flex-end; gap:10px; padding-bottom:18px}
    .promo .discount-pct{font-size:88px; line-height:.9; font-weight:900}
    .promo .discount-off{font-size:74px; line-height:.9; font-weight:900}
    .promo .promo-headline{
      position:absolute; left:56px; top:770px; width:510px;
      font-size:76px; line-height:.98; font-weight:900; letter-spacing:-.04em;
    }
    .promo .promo-secondary{
      position:absolute; left:56px; top:1004px; width:390px;
      font-size:58px; line-height:1.04; font-weight:900;
    }
    .promo .promo-cta{
      position:absolute; right:72px; top:1040px; width:168px;
      font-size:36px; line-height:1.02; font-weight:900; text-align:left;
      display:flex; align-items:center; gap:12px;
    }
    .promo .promo-cta::before{
      content:"↓"; font-size:42px; border:3px solid var(--ua-gold-2); width:46px; height:46px; display:grid; place-items:center; border-radius:50%; flex:0 0 auto;
    }
    .promo .promo-circle{position:absolute; left:-58px; bottom:192px; width:220px; height:220px; border-radius:50%; background:rgba(95,204,155,.42)}
    .promo .dots{position:absolute; right:68px; top:1044px; width:88px; height:124px; display:grid; grid-template-columns:repeat(4,1fr); gap:10px; opacity:.65}
    .promo .dots span,.events .dots span{width:4px;height:4px;border-radius:50%;background:var(--ua-gold-2);display:block}

    /* EVENTS */
    .events .dots{position:absolute; right:72px; top:146px; width:98px; height:244px; display:grid; grid-template-columns:repeat(4,1fr); gap:13px; opacity:.7}
    .events .events-eyebrow{position:absolute; left:56px; top:332px; width:420px; font-size:64px; line-height:1}
    .events .events-title{position:absolute; left:56px; top:406px; width:580px; font-size:94px; max-height:390px; overflow:hidden}
    .events .events-copy{position:absolute; left:56px; top:820px; width:540px; font-size:52px; max-height:220px; overflow:hidden}
    .events .cards{position:absolute; left:56px; right:56px; bottom:202px; display:grid; grid-template-columns:1fr 1fr 1.2fr; gap:16px}
    .events .card{
      min-height:205px; background:rgba(17,70,70,.48); border:2px solid rgba(247,211,116,.24); border-radius:24px; padding:20px 18px 18px;
      box-shadow: inset 0 1px 0 rgba(255,255,255,.04);
    }
    .events .card .icon{font-size:48px; margin-bottom:12px}
    .events .card .label{font-size:28px; font-weight:900; margin-bottom:10px; letter-spacing:.01em}
    .events .card .value{font-size:42px; line-height:1.02; font-weight:900}
    .events .blob{position:absolute; right:-22px; bottom:156px; width:180px; height:180px; border-radius:50%; background:rgba(95,204,155,.28)}

    /* PRODUCT */
    .product .blob{position:absolute; right:-26px; top:116px; width:220px; height:220px; border-radius:50%; background:rgba(95,204,155,.35)}
    .product .product-eyebrow{position:absolute; left:56px; top:332px; width:400px; font-size:60px}
    .product .product-title{position:absolute; left:56px; top:396px; width:530px; font-size:96px; max-height:360px; overflow:hidden}
    .product .product-copy{position:absolute; left:56px; top:838px; width:520px; font-size:52px; max-height:190px; overflow:hidden}
    .product .benefits{
      position:absolute; left:56px; right:56px; bottom:178px; min-height:318px;
      background:#f4cf77; color:#07293d; border-radius:28px; padding:28px 34px;
      box-shadow:var(--ua-shadow);
    }
    .product .benefits-title{font-size:56px; line-height:1; font-weight:900; margin:0 0 16px}
    .product .benefits ul{margin:0; padding-left:34px}
    .product .benefits li{font-size:41px; line-height:1.18; font-weight:800; margin:12px 0}

    /* COMMEMORATIVE */
    .commemorative .blob{position:absolute; right:-48px; bottom:112px; width:300px; height:300px; border-radius:50%; background:rgba(244,201,92,.38)}
    .commemorative .frame{
      position:absolute; left:56px; right:56px; top:358px; bottom:178px; border:4px solid rgba(244,216,115,.86); border-radius:32px;
    }
    .commemorative .heart{
      position:absolute; right:76px; bottom:148px; width:74px; height:74px; border-radius:50%; background:#d29e47; display:grid; place-items:center; font-size:40px; box-shadow:var(--ua-shadow); z-index:3
    }
    .commemorative .comm-eyebrow{position:absolute; left:56px; top:410px; width:380px; font-size:60px; z-index:3}
    .commemorative .comm-title{position:absolute; left:56px; top:486px; width:522px; font-size:92px; max-height:370px; overflow:hidden; z-index:3}
    .commemorative .comm-copy{position:absolute; left:56px; top:830px; width:490px; font-size:52px; max-height:220px; overflow:hidden; z-index:3}

    /* panel */
    h1.panel-title{font-size:20px; margin:0 0 4px; font-weight:900}
    .panel-sub{margin:0 0 18px; color:#b8cddd; font-size:13px; line-height:1.35}
    .group{border-top:1px solid var(--ua-border); padding-top:16px; margin-top:16px}
    .grid-two{display:grid; grid-template-columns:1fr 1fr; gap:10px}
    .field{margin-bottom:12px}
    .field label{display:block; font-size:12px; font-weight:800; margin:0 0 6px; color:#d9e9f4; text-transform:uppercase; letter-spacing:.04em}
    .field input,.field textarea,.field select{width:100%; padding:10px 12px}
    .field textarea{min-height:64px; resize:vertical}
    .hint{font-size:12px; color:#a9c2d3; line-height:1.35}
    .actions{display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-top:16px}
    .file-note{font-size:12px; color:#a9c2d3; margin-top:6px; word-break:break-all}
    .hidden{display:none !important}
    .footer-note{font-size:12px; color:#8fa9b9; margin-top:14px; line-height:1.4}

    @media (max-width: 1280px){
      .app-shell{grid-template-columns:1fr}
      .right-pane{border-left:0;border-top:1px solid var(--ua-border)}
      .flyer{width:min(680px, calc(100vw - 46px))}
    }
    @media (max-width: 760px){
      .left-pane{padding:18px}
      .topbar{flex-wrap:wrap}
      .select{min-width:100%}
      .topbar .spacer{display:none}
      .actions{grid-template-columns:1fr}
      .logo{left:34px; top:34px; width:260px}
      .partner{right:34px; top:34px; max-width:90px; max-height:60px}
      .content{padding:34px 34px 28px}
      .legal{left:34px; right:34px; bottom:28px; font-size:11px}
    }
  </style>
</head>
<body>
  <div class="app-shell">
    <section class="left-pane">
      <div class="topbar">
        <select id="templateSelect" class="select">
          <option value="promo">Flyer Promo</option>
          <option value="events">Flyer Eventos</option>
          <option value="product">Flyer Producto</option>
          <option value="commemorative">Flyer Conmemorativo</option>
        </select>
        <div class="spacer"></div>
        <button id="resetBtn" class="btn">Restaurar</button>
      </div>

      <div class="canvas-wrap">
        <div id="flyer" class="flyer promo">
          <div id="bgPhoto" class="bg-photo"></div>
          <div class="overlay"></div>
          <img id="partnerLogo" class="partner" alt="Partner logo" />
          <div class="content">
            <div class="logo"><img src="UA%20Logo_Zurich%20-%20Blanco%20(4).png" alt="Universal Assistance" /></div>
            <div id="dynamicTemplate"></div>
            <div id="legalText" class="legal"></div>
          </div>
        </div>
      </div>
    </section>

    <aside class="right-pane">
      <h1 class="panel-title">Editor UA</h1>
      <p class="panel-sub">Templates cerrados de Universal Assistance. Editá texto, fondo y logos sin romper la grilla visual.</p>

      <div class="group">
        <div class="field">
          <label>Logo partner opcional</label>
          <input id="partnerUpload" type="file" accept="image/*" />
          <div id="partnerFileName" class="file-note">Sin logo cargado</div>
        </div>
        <div class="field">
          <label>Imagen de fondo opcional</label>
          <input id="bgUpload" type="file" accept="image/*" />
          <div id="bgFileName" class="file-note">Sin imagen cargada</div>
        </div>
      </div>

      <div id="fieldsContainer"></div>

      <div class="actions">
        <button id="downloadSvgBtn" class="btn secondary">Descargar SVG</button>
        <button id="downloadPngBtn" class="btn secondary">Descargar PNG</button>
      </div>
      <p class="footer-note">El logo principal usa el archivo oficial ya subido al repositorio. Los textos se ajustan automáticamente para ayudar a evitar superposiciones.</p>
    </aside>
  </div>

  <script>
    const templates = {
      promo: {
        label: 'Flyer Promo',
        legal: 'Promoción válida según condiciones comerciales informadas por Universal Assistance. Consulte términos, vigencia y productos aplicables.',
        fields: [
          { key:'promoTop', label:'Texto superior', type:'text', value:'Hasta' },
          { key:'promoPercent', label:'Porcentaje', type:'text', value:'35' },
          { key:'promoOff', label:'Texto OFF', type:'text', value:'OFF' },
          { key:'promoHeadline', label:'Bajada principal', type:'textarea', value:'en asistencia al viajero' },
          { key:'promoSecondary', label:'Texto secundario', type:'textarea', value:'Promoción válida para agencias y partners seleccionados.' },
          { key:'promoCta', label:'CTA', type:'textarea', value:'DESCARGÁ\nNUESTRA APP' },
          { key:'legal', label:'Legal', type:'textarea', value:'Promoción válida según condiciones comerciales informadas por Universal Assistance. Consulte términos, vigencia y productos aplicables.' }
        ],
        render: (d) => `
          <div class="promo">
            <div class="promo-circle"></div>
            <div class="dots">${'<span></span>'.repeat(20)}</div>
            <div class="discount-box">
              <div class="promo-top fit-lines" data-min="38" data-max="74">${esc(d.promoTop)}</div>
              <div class="discount-line">
                <div class="discount-num fit-text" data-min="96" data-max="210">${esc(d.promoPercent)}</div>
                <div class="discount-side">
                  <div class="discount-pct fit-text" data-min="44" data-max="88">%</div>
                  <div class="discount-off fit-text" data-min="36" data-max="74">${esc(d.promoOff)}</div>
                </div>
              </div>
            </div>
            <div class="promo-headline fit-lines" data-min="34" data-max="76">${nl2br(d.promoHeadline)}</div>
            <div class="promo-secondary fit-lines" data-min="22" data-max="58">${nl2br(d.promoSecondary)}</div>
            <div class="promo-cta fit-lines" data-min="16" data-max="36">${nl2br(d.promoCta)}</div>
          </div>
        `
      },
      events: {
        label: 'Flyer Eventos',
        legal: 'Evento sujeto a confirmación de cupos y condiciones informadas por Universal Assistance.',
        fields: [
          { key:'eventsEyebrow', label:'Pre título', type:'text', value:'Te esperamos en' },
          { key:'eventsTitle', label:'Nombre del evento', type:'textarea', value:'Congreso\nde Agentes\nde Viajes' },
          { key:'eventsCopy', label:'Bajada', type:'textarea', value:'Una jornada para compartir novedades, herramientas y oportunidades comerciales.' },
          { key:'eventsDate', label:'Fecha', type:'textarea', value:'Miércoles\n24.06.26' },
          { key:'eventsTime', label:'Hora', type:'textarea', value:'23:00 hs' },
          { key:'eventsPlace', label:'Lugar', type:'textarea', value:'Av. Córdoba 820,\nCABA' },
          { key:'legal', label:'Legal', type:'textarea', value:'Evento sujeto a confirmación de cupos y condiciones informadas por Universal Assistance.' }
        ],
        render: (d) => `
          <div class="events use-pattern">
            <div class="dots">${'<span></span>'.repeat(28)}</div>
            <div class="events-eyebrow fit-lines" data-min="26" data-max="64">${esc(d.eventsEyebrow)}</div>
            <div class="events-title title-main fit-lines" data-min="46" data-max="94">${nl2br(d.eventsTitle)}</div>
            <div class="events-copy body-copy fit-lines" data-min="24" data-max="52">${nl2br(d.eventsCopy)}</div>
            <div class="cards">
              <div class="card">
                <div class="icon">📅</div>
                <div class="label">FECHA</div>
                <div class="value fit-lines" data-min="18" data-max="42">${nl2br(d.eventsDate)}</div>
              </div>
              <div class="card">
                <div class="icon">🕒</div>
                <div class="label">HORA</div>
                <div class="value fit-lines" data-min="18" data-max="42">${nl2br(d.eventsTime)}</div>
              </div>
              <div class="card">
                <div class="icon">📍</div>
                <div class="label">LUGAR</div>
                <div class="value fit-lines" data-min="18" data-max="42">${nl2br(d.eventsPlace)}</div>
              </div>
            </div>
            <div class="blob"></div>
          </div>
        `
      },
      product: {
        label: 'Flyer Producto',
        legal: 'Productos y coberturas sujetos a condiciones generales del servicio contratado.',
        fields: [
          { key:'productEyebrow', label:'Intro', type:'text', value:'Conocé nuestros' },
          { key:'productTitle', label:'Título principal', type:'textarea', value:'Productos\npara viajar\ntranquilo' },
          { key:'productCopy', label:'Bajada', type:'textarea', value:'Coberturas diseñadas para acompañar a tus pasajeros antes, durante y después del viaje.' },
          { key:'productBoxTitle', label:'Título caja beneficios', type:'text', value:'Beneficios destacados' },
          { key:'benefit1', label:'Beneficio 1', type:'text', value:'Asistencia médica internacional' },
          { key:'benefit2', label:'Beneficio 2', type:'text', value:'Teleasistencia incluida' },
          { key:'benefit3', label:'Beneficio 3', type:'text', value:'Coberturas para cada tipo de viaje' },
          { key:'legal', label:'Legal', type:'textarea', value:'Productos y coberturas sujetos a condiciones generales del servicio contratado.' }
        ],
        render: (d) => `
          <div class="product">
            <div class="blob"></div>
            <div class="product-eyebrow fit-lines" data-min="22" data-max="60">${esc(d.productEyebrow)}</div>
            <div class="product-title title-main fit-lines" data-min="40" data-max="96">${nl2br(d.productTitle)}</div>
            <div class="product-copy body-copy fit-lines" data-min="24" data-max="52">${nl2br(d.productCopy)}</div>
            <div class="benefits">
              <h3 class="benefits-title fit-lines" data-min="24" data-max="56">${esc(d.productBoxTitle)}</h3>
              <ul>
                ${d.benefit1 ? `<li class="fit-lines" data-min="18" data-max="41">${esc(d.benefit1)}</li>`:''}
                ${d.benefit2 ? `<li class="fit-lines" data-min="18" data-max="41">${esc(d.benefit2)}</li>`:''}
                ${d.benefit3 ? `<li class="fit-lines" data-min="18" data-max="41">${esc(d.benefit3)}</li>`:''}
              </ul>
            </div>
          </div>
        `
      },
      commemorative: {
        label: 'Flyer Conmemorativo',
        legal: 'Mensaje institucional de Universal Assistance.',
        fields: [
          { key:'commEyebrow', label:'Pre título', type:'text', value:'Hoy celebramos' },
          { key:'commTitle', label:'Título principal', type:'textarea', value:'Una fecha\npara sentirnos\nmás cerca' },
          { key:'commCopy', label:'Mensaje institucional', type:'textarea', value:'Universal Assistance acompaña cada viaje, cada historia y cada momento especial.' },
          { key:'legal', label:'Firma / legal', type:'textarea', value:'Mensaje institucional de Universal Assistance.' }
        ],
        render: (d) => `
          <div class="commemorative">
            <div class="frame"></div>
            <div class="blob"></div>
            <div class="heart">♥</div>
            <div class="comm-eyebrow fit-lines" data-min="24" data-max="60">${esc(d.commEyebrow)}</div>
            <div class="comm-title title-main fit-lines" data-min="38" data-max="92">${nl2br(d.commTitle)}</div>
            <div class="comm-copy body-copy fit-lines" data-min="24" data-max="52">${nl2br(d.commCopy)}</div>
          </div>
        `
      }
    };

    const state = {
      template:'promo',
      partnerUrl:'',
      bgUrl:'',
      values:{}
    };

    const flyer = document.getElementById('flyer');
    const dynamicTemplate = document.getElementById('dynamicTemplate');
    const legalText = document.getElementById('legalText');
    const fieldsContainer = document.getElementById('fieldsContainer');
    const templateSelect = document.getElementById('templateSelect');
    const partnerLogo = document.getElementById('partnerLogo');
    const bgPhoto = document.getElementById('bgPhoto');

    function esc(str=''){
      return String(str)
        .replace(/&/g,'&amp;')
        .replace(/</g,'&lt;')
        .replace(/>/g,'&gt;')
        .replace(/"/g,'&quot;')
        .replace(/'/g,'&#039;');
    }
    function nl2br(str=''){ return esc(str).replace(/\n/g,'<br>'); }

    function defaultValues(templateKey){
      const obj={};
      templates[templateKey].fields.forEach(f=> obj[f.key]=f.value);
      return obj;
    }

    function renderFields(){
      const tpl=templates[state.template];
      fieldsContainer.innerHTML = `
        <div class="group">
          <h1 class="panel-title">${tpl.label}</h1>
          <p class="panel-sub">Completá los campos de esta plantilla. La composición es fija para cuidar la grilla y la marca.</p>
          ${tpl.fields.map(field => `
            <div class="field">
              <label for="field-${field.key}">${field.label}</label>
              ${field.type === 'textarea'
                ? `<textarea id="field-${field.key}" data-key="${field.key}">${esc(state.values[field.key] ?? '')}</textarea>`
                : `<input id="field-${field.key}" data-key="${field.key}" type="text" value="${esc(state.values[field.key] ?? '')}" />`}
            </div>
          `).join('')}
        </div>
      `;
      fieldsContainer.querySelectorAll('[data-key]').forEach(el=>{
        el.addEventListener('input',e=>{
          state.values[e.target.dataset.key]=e.target.value;
          renderFlyer();
        });
      });
    }

    function renderFlyer(){
      const tpl = templates[state.template];
      flyer.className = `flyer ${state.template}`;
      flyer.classList.toggle('use-pattern', state.template === 'events');
      dynamicTemplate.innerHTML = tpl.render(state.values);
      legalText.textContent = state.values.legal || tpl.legal;
      partnerLogo.src = state.partnerUrl || '';
      partnerLogo.classList.toggle('show', !!state.partnerUrl);
      bgPhoto.style.backgroundImage = state.bgUrl ? `url(${state.bgUrl})` : '';
      bgPhoto.classList.toggle('show', !!state.bgUrl);
      requestAnimationFrame(fitAllText);
    }

    function setTemplate(templateKey, preserveUploads=true){
      state.template = templateKey;
      state.values = defaultValues(templateKey);
      if(!preserveUploads){
        state.partnerUrl='';
        state.bgUrl='';
        document.getElementById('partnerUpload').value='';
        document.getElementById('bgUpload').value='';
        document.getElementById('partnerFileName').textContent='Sin logo cargado';
        document.getElementById('bgFileName').textContent='Sin imagen cargada';
      }
      renderFields();
      renderFlyer();
    }

    function fitAllText(){
      const els = flyer.querySelectorAll('.fit-text,.fit-lines');
      els.forEach(el=>fitElement(el));
    }

    function fitElement(el){
      const min = Number(el.dataset.min || 14);
      const max = Number(el.dataset.max || 80);
      let size = max;
      el.style.fontSize = size+'px';
      el.style.lineHeight = el.classList.contains('fit-lines') ? '1.02' : '0.95';
      const maxIterations=100;
      let i=0;
      while ((el.scrollHeight > el.clientHeight + 1 || el.scrollWidth > el.clientWidth + 1) && size > min && i < maxIterations){
        size -= 1;
        el.style.fontSize = size + 'px';
        i++;
      }
    }

    function svgMarkup(){
      const clone = flyer.cloneNode(true);
      clone.style.width = '1080px';
      clone.style.height = '1920px';
      clone.querySelectorAll('.bg-photo').forEach(node=>{
        if(state.bgUrl){
          node.style.backgroundImage = `url(${state.bgUrl})`;
          node.classList.add('show');
        }
      });
      if(state.partnerUrl){
        clone.querySelectorAll('#partnerLogo, .partner').forEach(node=>{
          node.setAttribute('src', state.partnerUrl);
          node.classList.add('show');
        });
      }
      const styles = document.querySelector('style').textContent;
      return `<?xml version="1.0" encoding="UTF-8"?>
      <svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1920" viewBox="0 0 1080 1920">
        <foreignObject width="100%" height="100%">
          <div xmlns="http://www.w3.org/1999/xhtml" style="width:1080px;height:1920px;">
            <style>${styles}</style>
            ${clone.outerHTML}
          </div>
        </foreignObject>
      </svg>`;
    }

    function downloadFile(blob, filename){
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = filename;
      document.body.appendChild(a);
      a.click();
      a.remove();
      setTimeout(()=>URL.revokeObjectURL(a.href),500);
    }

    document.getElementById('downloadSvgBtn').addEventListener('click',()=>{
      const blob = new Blob([svgMarkup()],{type:'image/svg+xml;charset=utf-8'});
      downloadFile(blob, `ua-flyer-${state.template}.svg`);
    });

    document.getElementById('downloadPngBtn').addEventListener('click',()=>{
      const svg = svgMarkup();
      const blob = new Blob([svg], {type:'image/svg+xml;charset=utf-8'});
      const url = URL.createObjectURL(blob);
      const img = new Image();
      img.onload = () => {
        const canvas = document.createElement('canvas');
        canvas.width = 1080; canvas.height = 1920;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(img,0,0);
        canvas.toBlob((pngBlob)=>{
          downloadFile(pngBlob, `ua-flyer-${state.template}.png`);
          URL.revokeObjectURL(url);
        }, 'image/png');
      };
      img.src = url;
    });

    document.getElementById('resetBtn').addEventListener('click',()=>{
      setTemplate(state.template, false);
    });

    templateSelect.addEventListener('change',e=>setTemplate(e.target.value,true));

    document.getElementById('partnerUpload').addEventListener('change',e=>{
      const file = e.target.files?.[0];
      if(!file){ state.partnerUrl=''; document.getElementById('partnerFileName').textContent='Sin logo cargado'; renderFlyer(); return; }
      const reader = new FileReader();
      reader.onload = ev => { state.partnerUrl = ev.target.result; document.getElementById('partnerFileName').textContent=file.name; renderFlyer(); };
      reader.readAsDataURL(file);
    });

    document.getElementById('bgUpload').addEventListener('change',e=>{
      const file = e.target.files?.[0];
      if(!file){ state.bgUrl=''; document.getElementById('bgFileName').textContent='Sin imagen cargada'; renderFlyer(); return; }
      const reader = new FileReader();
      reader.onload = ev => { state.bgUrl = ev.target.result; document.getElementById('bgFileName').textContent=file.name; renderFlyer(); };
      reader.readAsDataURL(file);
    });

    // init
    templateSelect.value='promo';
    setTemplate('promo', false);
  </script>
</body>
</html>
