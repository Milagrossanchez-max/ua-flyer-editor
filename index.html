<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>UA Flyer Editor</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800;900&family=Bebas+Neue&display=swap');

    :root{
      --deep:#061824;
      --deep2:#082437;
      --blue:#00528f;
      --navy:#002447;
      --teal:#008091;
      --cyan:#00c4df;
      --mint:#59c982;
      --pink:#ff436e;
      --cream:#ffd56b;
      --cream2:#ffe08c;
      --white:#ffffff;
      --panel:#0b2132;
      --line:rgba(255,255,255,.12);
      --scale: .43;
    }

    *{box-sizing:border-box}
    body{
      margin:0;
      background:radial-gradient(circle at 20% 0%, rgba(0,196,223,.12), transparent 28%), linear-gradient(135deg,#07131e,#0b1c2a 55%,#05101a);
      color:#fff;
      font-family:Poppins, Arial, sans-serif;
    }
    .app{min-height:100vh;display:grid;grid-template-columns:minmax(520px,1fr) 390px}
    .stage{padding:28px;overflow:auto}
    .stage-top{display:flex;align-items:center;gap:16px;margin:0 auto 22px;width:calc(1080px * var(--scale));min-width:460px}
    select,button,input,textarea{font-family:Poppins,Arial,sans-serif}
    .template-select{background:#10283b;color:#ffd56b;border:1px solid rgba(255,255,255,.18);border-radius:18px;padding:15px 20px;font-weight:900;font-size:18px;min-width:250px;box-shadow:0 14px 34px rgba(0,0,0,.28)}
    .btn{border:0;border-radius:18px;background:linear-gradient(135deg,#67e6ba,#52ca98);color:#062319;padding:15px 22px;font-weight:900;font-size:17px;cursor:pointer;box-shadow:0 14px 34px rgba(0,0,0,.28)}
    .btn.dark{background:#10283b;color:#fff;border:1px solid rgba(255,255,255,.14)}
    .stage-spacer{flex:1}
    .artboard-shell{width:calc(1080px * var(--scale));height:calc(1920px * var(--scale));margin:0 auto;min-width:460px;min-height:818px;position:relative}
    .artboard{position:absolute;left:0;top:0;width:1080px;height:1920px;transform:scale(var(--scale));transform-origin:top left;overflow:hidden;background:#062638;box-shadow:0 34px 80px rgba(0,0,0,.42)}
    .art-bg{position:absolute;inset:0;background:radial-gradient(circle at 93% 24%, rgba(79,201,135,.30) 0 0, rgba(79,201,135,.20) 0 125px, transparent 126px),radial-gradient(circle at -4% 82%, rgba(79,201,135,.40) 0 0, rgba(79,201,135,.25) 0 210px, transparent 211px),linear-gradient(135deg,#031b29 0%,#073149 46%,#08756d 100%)}
    .bg-photo{position:absolute;inset:0;background-size:cover;background-position:center;opacity:0;z-index:1}.bg-photo.show{opacity:.24}.photo-overlay{position:absolute;inset:0;z-index:2;background:linear-gradient(135deg,rgba(3,21,32,.90),rgba(5,48,69,.80) 55%,rgba(8,112,100,.58))}
    .decor{position:absolute;z-index:3;pointer-events:none}.blob-a{width:240px;height:150px;border-radius:50%;background:rgba(79,201,135,.27);right:80px;top:130px;transform:rotate(-25deg)}.blob-b{width:285px;height:285px;border-radius:50%;background:rgba(79,201,135,.28);left:-120px;bottom:245px}.blob-c{width:315px;height:315px;border-radius:50%;background:rgba(79,201,135,.25);right:-120px;bottom:245px}.blob-d{width:370px;height:370px;border-radius:50%;background:linear-gradient(135deg,rgba(255,213,107,.55),rgba(255,67,110,.35));right:-110px;bottom:35px}
    .dot-grid{display:grid;grid-template-columns:repeat(5,10px);gap:20px;opacity:.65}.dot-grid span{width:6px;height:6px;border-radius:50%;background:var(--cream)}.dot-promo{right:140px;bottom:360px}.dot-events{right:82px;top:125px}
    .logo-main{position:absolute;z-index:5;left:72px;top:70px;width:430px;height:auto;display:block;object-fit:contain}.partner-logo{position:absolute;z-index:6;right:72px;top:78px;max-width:180px;max-height:92px;object-fit:contain;display:none;filter:drop-shadow(0 8px 16px rgba(0,0,0,.24))}.partner-logo.show{display:block}
    .legal{position:absolute;z-index:5;left:72px;right:72px;bottom:58px;font-size:24px;line-height:1.25;color:#fff1bd;font-weight:700;max-height:88px;overflow:hidden}
    .field-area{position:absolute;z-index:5;color:var(--cream);text-shadow:0 6px 10px rgba(0,0,0,.22)}.txt{margin:0;font-weight:900;letter-spacing:-.045em;line-height:.96;white-space:pre-line;overflow:hidden}.txt-copy{margin:0;font-weight:800;letter-spacing:-.025em;line-height:1.12;white-space:pre-line;overflow:hidden}
    .promo-box{left:72px;top:365px;width:850px;height:320px;border:6px solid var(--cream);border-radius:42px;padding:34px 45px}.promo-kicker{font-size:80px;height:82px}.promo-discount{display:flex;align-items:flex-end;margin-top:6px;height:168px;overflow:visible}.discount-number{font-size:218px;line-height:.78;font-weight:900;letter-spacing:-.08em;margin-right:16px}.discount-percent{font-size:82px;line-height:.92;font-weight:900;margin-bottom:20px;margin-right:14px}.discount-off{font-size:68px;line-height:.92;font-weight:900;margin-bottom:18px}.promo-head{left:72px;top:742px;width:610px;height:190px;font-size:78px}.promo-secondary{left:72px;top:990px;width:470px;height:190px;font-size:48px}.promo-cta{right:76px;top:1125px;width:250px;min-height:90px;display:flex;align-items:flex-start;gap:14px;font-size:34px;line-height:1.05;font-weight:900;text-align:left}.promo-cta .download-icon{width:50px;height:50px;border:4px solid var(--cream);border-radius:50%;display:grid;place-items:center;font-size:34px;flex:0 0 auto;line-height:1}
    .events-kicker{left:72px;top:365px;width:620px;height:72px;font-size:60px}.events-title{left:72px;top:450px;width:660px;height:375px;font-size:96px}.events-copy{left:72px;top:850px;width:780px;height:150px;font-size:44px}.event-cards{position:absolute;z-index:5;left:72px;right:72px;bottom:205px;display:grid;grid-template-columns:1fr 1fr 1.25fr;gap:18px}.event-card{min-height:190px;border-radius:28px;background:rgba(7,55,61,.58);border:2px solid rgba(255,213,107,.38);padding:26px 22px;color:var(--cream);overflow:hidden}.event-icon{font-size:54px;line-height:1;margin-bottom:14px;color:var(--cream)}.event-label{font-size:25px;line-height:1;font-weight:900;margin-bottom:12px;letter-spacing:.02em}.event-value{font-size:31px;line-height:1.08;font-weight:900;white-space:pre-line;overflow:hidden}
    .product-kicker{left:72px;top:360px;width:610px;height:72px;font-size:56px}.product-title{left:72px;top:438px;width:690px;height:340px;font-size:92px}.product-copy{left:72px;top:805px;width:685px;height:175px;font-size:42px}.benefit-box{position:absolute;z-index:5;left:72px;right:72px;bottom:205px;height:295px;border-radius:32px;background:var(--cream2);color:#073149;padding:35px 42px;box-shadow:0 22px 45px rgba(0,0,0,.25);overflow:hidden}.benefit-title{font-size:50px;line-height:1;font-weight:900;margin:0 0 22px;letter-spacing:-.03em}.benefit-list{margin:0;padding-left:34px;font-size:31px;line-height:1.25;font-weight:800}.benefit-list li{margin:8px 0}
    .comm-frame{position:absolute;z-index:4;left:72px;top:345px;right:72px;bottom:205px;border:5px solid rgba(255,213,107,.90);border-radius:44px}.comm-kicker{left:110px;top:430px;width:620px;height:72px;font-size:56px}.comm-title{left:110px;top:520px;width:705px;height:365px;font-size:88px}.comm-copy{left:110px;top:930px;width:670px;height:205px;font-size:39px}.heart{position:absolute;z-index:5;right:80px;bottom:175px;width:82px;height:82px;border-radius:50%;background:#d8a142;display:grid;place-items:center;color:#fff0bd;font-size:44px;box-shadow:0 18px 36px rgba(0,0,0,.30)}
    .panel h1{font-size:22px;margin:0 0 6px}.panel p{margin:0 0 18px;color:#aac2d1;font-size:13px;line-height:1.4}.group{border-top:1px solid var(--line);padding-top:16px;margin-top:16px}.field{margin-bottom:13px}.field label{display:block;margin-bottom:6px;color:#d8e7ef;font-size:12px;font-weight:900;letter-spacing:.04em;text-transform:uppercase}.field input,.field textarea{width:100%;background:#10283b;color:#fff;border:1px solid rgba(255,255,255,.14);border-radius:12px;padding:10px 12px;font-size:14px}.field textarea{min-height:72px;resize:vertical}.file-name{margin-top:6px;font-size:12px;color:#aac2d1;word-break:break-all}.actions{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:16px}.warning{background:rgba(255,213,107,.10);border:1px solid rgba(255,213,107,.24);color:#ffe8a3;border-radius:14px;padding:12px;font-size:12px;line-height:1.35;margin-bottom:14px}
    @media(max-width:1180px){:root{--scale:.36}.app{grid-template-columns:1fr}.right-pane{border-top:1px solid var(--line)}}
  </style>
</head>
<body>
  <main class="app">
    <section class="stage">
      <div class="stage-top"><select id="templateSelect" class="template-select"><option value="promo">Flyer Promo</option><option value="events">Flyer Eventos</option><option value="product">Flyer Producto</option><option value="comm">Flyer Conmemorativo</option></select><div class="stage-spacer"></div><button class="btn" id="resetBtn">Restaurar</button></div>
      <div class="artboard-shell"><section id="artboard" class="artboard"><div class="art-bg"></div><div id="bgPhoto" class="bg-photo"></div><div class="photo-overlay"></div><img class="logo-main" src="UA%20Logo_Zurich%20-%20Blanco%20(4).png" alt="Universal Assistance"><img id="partnerLogo" class="partner-logo" alt="Partner"><div id="templateRoot"></div><div id="legal" class="legal"></div></section></div>
    </section>
    <aside class="right-pane panel"><h1>Editor de Flyers UA</h1><p>Plantillas cerradas con grilla fija. Editá campos sin romper la identidad visual.</p><div class="warning">La vista previa usa el logo oficial subido al repositorio. Para que se vea correctamente, el archivo debe llamarse exactamente: <b>UA Logo_Zurich - Blanco (4).png</b></div><div class="group"><div class="field"><label>Logo partner opcional</label><input type="file" id="partnerUpload" accept="image/*"><div id="partnerName" class="file-name">Sin logo cargado</div></div><div class="field"><label>Imagen de fondo opcional</label><input type="file" id="bgUpload" accept="image/*"><div id="bgName" class="file-name">Sin fondo cargado</div></div></div><div id="formFields" class="group"></div><div class="actions"><button class="btn dark" id="downloadSvg">Descargar SVG</button><button class="btn dark" id="downloadPng">Descargar PNG</button></div></aside>
  </main>
  <script>
    const defaults={promo:{top:'Hasta',percent:'35',off:'OFF',headline:'en asistencia al viajero',secondary:'Promoción válida para agencias y partners seleccionados.',cta:'DESCARGÁ\nNUESTRA APP',legal:'Promoción válida según condiciones comerciales informadas por Universal Assistance. Consulte términos, vigencia y productos aplicables.'},events:{pre:'Te esperamos en',title:'Congreso\nde Agentes\nde Viajes',copy:'Una jornada para compartir novedades, herramientas y oportunidades comerciales.',date:'Miércoles\n24.06.26',time:'23:00 hs',place:'Av. Córdoba 820,\nCABA',legal:'Evento sujeto a confirmación de cupos y condiciones informadas por Universal Assistance.'},product:{pre:'Conocé nuestros',title:'Productos\npara viajar\ntranquilo',copy:'Coberturas diseñadas para acompañar a tus pasajeros antes, durante y después del viaje.',boxTitle:'Beneficios destacados',b1:'Asistencia médica internacional',b2:'Teleasistencia incluida',b3:'Coberturas para cada tipo de viaje',legal:'Productos y coberturas sujetos a condiciones generales del servicio contratado.'},comm:{pre:'Hoy celebramos',title:'Una fecha\npara sentirnos\nmás cerca',copy:'Universal Assistance acompaña cada viaje, cada historia y cada momento especial.',legal:'Mensaje institucional de Universal Assistance.'}};
    const labels={promo:[['top','Texto superior','text'],['percent','Porcentaje','text'],['off','Texto OFF','text'],['headline','Bajada principal','textarea'],['secondary','Texto secundario','textarea'],['cta','CTA','textarea'],['legal','Legal','textarea']],events:[['pre','Pre título','text'],['title','Nombre del evento','textarea'],['copy','Bajada','textarea'],['date','Fecha','textarea'],['time','Hora','textarea'],['place','Lugar','textarea'],['legal','Legal','textarea']],product:[['pre','Intro','text'],['title','Título principal','textarea'],['copy','Bajada','textarea'],['boxTitle','Título de beneficios','text'],['b1','Beneficio 1','text'],['b2','Beneficio 2','text'],['b3','Beneficio 3','text'],['legal','Legal','textarea']],comm:[['pre','Pre título','text'],['title','Título principal','textarea'],['copy','Mensaje institucional','textarea'],['legal','Firma / legal','textarea']]};
    let current='promo', data=JSON.parse(JSON.stringify(defaults)), partnerData='', bgData='';
    const root=document.getElementById('templateRoot'), legalEl=document.getElementById('legal'), form=document.getElementById('formFields'), artboard=document.getElementById('artboard');
    function esc(s=''){return String(s).replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[m]))} function br(s=''){return esc(s).replace(/\n/g,'<br>')} function dotGrid(n=25){return `<div class="decor dot-grid dot-${current}">${'<span></span>'.repeat(n)}</div>`}
    function renderTemplate(){const d=data[current];let html=''; if(current==='promo'){html=`<div class="decor blob-a"></div><div class="decor blob-b"></div>${dotGrid(20)}<div class="field-area promo-box"><p class="txt promo-kicker">${esc(d.top)}</p><div class="promo-discount"><span class="discount-number">${esc(d.percent)}</span><span class="discount-percent">%</span><span class="discount-off">${esc(d.off)}</span></div></div><p class="field-area txt promo-head">${br(d.headline)}</p><p class="field-area txt-copy promo-secondary">${br(d.secondary)}</p><div class="field-area promo-cta"><span class="download-icon">↓</span><span>${br(d.cta)}</span></div>`} if(current==='events'){html=`${dotGrid(35)}<div class="decor blob-c"></div><p class="field-area txt-copy events-kicker">${br(d.pre)}</p><p class="field-area txt events-title">${br(d.title)}</p><p class="field-area txt-copy events-copy">${br(d.copy)}</p><div class="event-cards"><div class="event-card"><div class="event-icon">▦</div><div class="event-label">FECHA</div><div class="event-value">${br(d.date)}</div></div><div class="event-card"><div class="event-icon">◷</div><div class="event-label">HORA</div><div class="event-value">${br(d.time)}</div></div><div class="event-card"><div class="event-icon">●</div><div class="event-label">LUGAR</div><div class="event-value">${br(d.place)}</div></div></div>`} if(current==='product'){html=`<div class="decor blob-a"></div><p class="field-area txt-copy product-kicker">${br(d.pre)}</p><p class="field-area txt product-title">${br(d.title)}</p><p class="field-area txt-copy product-copy">${br(d.copy)}</p><div class="benefit-box"><h2 class="benefit-title">${esc(d.boxTitle)}</h2><ul class="benefit-list">${d.b1?`<li>${esc(d.b1)}</li>`:''}${d.b2?`<li>${esc(d.b2)}</li>`:''}${d.b3?`<li>${esc(d.b3)}</li>`:''}</ul></div>`} if(current==='comm'){html=`<div class="comm-frame"></div><div class="decor blob-d"></div><div class="heart">♥</div><p class="field-area txt-copy comm-kicker">${br(d.pre)}</p><p class="field-area txt comm-title">${br(d.title)}</p><p class="field-area txt-copy comm-copy">${br(d.copy)}</p>`} root.innerHTML=html; legalEl.textContent=d.legal||''; document.getElementById('partnerLogo').src=partnerData||''; document.getElementById('partnerLogo').classList.toggle('show',!!partnerData); document.getElementById('bgPhoto').style.backgroundImage=bgData?`url(${bgData})`:''; document.getElementById('bgPhoto').classList.toggle('show',!!bgData)}
    function renderForm(){form.innerHTML=labels[current].map(([key,label,type])=>`<div class="field"><label>${label}</label>${type==='textarea'?`<textarea data-key="${key}">${esc(data[current][key]||'')}</textarea>`:`<input data-key="${key}" value="${esc(data[current][key]||'')}">`}</div>`).join(''); form.querySelectorAll('[data-key]').forEach(el=>el.addEventListener('input',e=>{data[current][e.target.dataset.key]=e.target.value;renderTemplate()}))}
    function switchTemplate(t){current=t;renderForm();renderTemplate()} document.getElementById('templateSelect').addEventListener('change',e=>switchTemplate(e.target.value)); document.getElementById('resetBtn').addEventListener('click',()=>{data[current]=JSON.parse(JSON.stringify(defaults[current]));renderForm();renderTemplate()});
    document.getElementById('partnerUpload').addEventListener('change',e=>{const file=e.target.files[0]; if(!file){partnerData='';renderTemplate();return} const r=new FileReader(); r.onload=ev=>{partnerData=ev.target.result;document.getElementById('partnerName').textContent=file.name;renderTemplate()}; r.readAsDataURL(file)}); document.getElementById('bgUpload').addEventListener('change',e=>{const file=e.target.files[0]; if(!file){bgData='';renderTemplate();return} const r=new FileReader(); r.onload=ev=>{bgData=ev.target.result;document.getElementById('bgName').textContent=file.name;renderTemplate()}; r.readAsDataURL(file)});
    function absolutizeImages(clone){clone.querySelectorAll('img').forEach(img=>{const src=img.getAttribute('src'); if(src&&!src.startsWith('data:')&&!src.startsWith('http')) img.setAttribute('src',new URL(src,window.location.href).href)})} function makeSvg(){const clone=artboard.cloneNode(true); clone.style.transform='none'; clone.style.width='1080px'; clone.style.height='1920px'; absolutizeImages(clone); const styles=document.querySelector('style').textContent.replace(/@import[^;]+;/g,''); return `<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1920" viewBox="0 0 1080 1920"><foreignObject width="1080" height="1920"><div xmlns="http://www.w3.org/1999/xhtml"><style>${styles}</style>${clone.outerHTML}</div></foreignObject></svg>`} function download(blob,name){const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=name;document.body.appendChild(a);a.click();a.remove();setTimeout(()=>URL.revokeObjectURL(a.href),800)} document.getElementById('downloadSvg').addEventListener('click',()=>download(new Blob([makeSvg()],{type:'image/svg+xml'}),`ua-${current}.svg`)); document.getElementById('downloadPng').addEventListener('click',()=>{const url=URL.createObjectURL(new Blob([makeSvg()],{type:'image/svg+xml'})); const img=new Image(); img.onload=()=>{const c=document.createElement('canvas');c.width=1080;c.height=1920;c.getContext('2d').drawImage(img,0,0); c.toBlob(blob=>{download(blob,`ua-${current}.png`);URL.revokeObjectURL(url)},'image/png')}; img.src=url}); switchTemplate('promo');
  </script>
</body>
</html>
